<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sourfruits</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header markup is injected by js/header.js -->
  <header class="site-header"></header>

  <main>
    <a class="back-link" href="index.html">&larr; All posts</a>

    <h1 id="tag-heading" class="tag-heading"></h1>

    <section id="grid" class="grid" aria-label="Tagged posts">
      <!-- Matching thumbnails are injected here by js/tag.js -->
    </section>
    <p id="status" class="status">Loading posts…</p>
    <nav id="pagination" class="pagination" aria-label="Pagination">
      <!-- Page links are injected here by js/tag.js -->
    </nav>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Sourfruits</p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/header.js"></script>
  <script src="js/pagination.js"></script>
  <script src="js/tag.js"></script>
</body>
</html>
