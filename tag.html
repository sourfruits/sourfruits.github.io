<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sourfruits</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="index.html">Sourfruits</a>
    <p class="site-tagline">A blog about life's tart little pleasures</p>
  </header>

  <main>
    <a class="back-link" href="index.html">&larr; All posts</a>

    <h1 id="tag-heading" class="tag-heading"></h1>

    <section id="grid" class="grid" aria-label="Tagged posts">
      <!-- Matching thumbnails are injected here by js/tag.js -->
    </section>
    <p id="status" class="status">Loading posts…</p>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Sourfruits</p>
  </footer>

  <script src="js/tag.js"></script>
</body>
</html>
