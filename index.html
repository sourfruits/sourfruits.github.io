<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sourfruits — a photo blog</title>
  <meta name="description" content="A blog about life's tart little pleasures.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="index.html">Sourfruits</a>
    <p class="site-tagline">A blog about life's tart little pleasures</p>
    <a class="header-search" href="search.html" aria-label="Search">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="11" cy="11" r="7"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
      </svg>
    </a>
  </header>

  <main>
    <section id="grid" class="grid" aria-label="Photo posts">
      <!-- Thumbnails are injected here by js/main.js -->
    </section>
    <p id="status" class="status">Loading posts…</p>
    <nav id="pagination" class="pagination" aria-label="Pagination">
      <!-- Page links are injected here by js/main.js -->
    </nav>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Sourfruits</p>
  </footer>

  <script src="js/pagination.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
