<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tags — Sourfruits</title>
  <meta name="description" content="All tags used across Sourfruits posts.">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Header markup is injected by js/header.js -->
  <header class="site-header"></header>

  <main>
    <h1 class="tag-heading tags-heading">All tags</h1>
    <p id="status" class="status tags-summary">Loading tags…</p>

    <div id="tag-list" class="tag-index" aria-label="All tags">
      <!-- Tag index rows are injected here by js/tags.js -->
    </div>
  </main>

  <footer class="site-footer">
    <p>&copy; <span id="year"></span> Sourfruits</p>
  </footer>

  <script src="js/utils.js"></script>
  <script src="js/header.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/tags.js"></script>
</body>
</html>
